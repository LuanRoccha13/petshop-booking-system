spring.application.name=backend-spring

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:petshop}
spring.datasource.username=${DB_USERNAME:petshop}
spring.datasource.password=${DB_PASSWORD:petshop}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET:Da3Nk5Qp8Rz2Xc7Vt1Yh4Lb9Fp0Sa6Ge}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

app.upload-dir=${APP_UPLOAD_DIR:uploads}

springdoc.swagger-ui.path=/swagger-ui.html
