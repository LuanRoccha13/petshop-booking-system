<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="auth-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4e8"/>
      <stop offset="50%" stop-color="#ffe0d2"/>
      <stop offset="100%" stop-color="#ffd6c7"/>
    </linearGradient>
    <linearGradient id="auth-collar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e85a28"/>
    </linearGradient>
    <radialGradient id="auth-blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auth-blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e85a28" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e85a28" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background fill -->
  <rect width="480" height="640" fill="url(#auth-bg)"/>

  <!-- Decorative blobs -->
  <circle cx="400" cy="80" r="160" fill="url(#auth-blob1)"/>
  <circle cx="60" cy="560" r="200" fill="url(#auth-blob2)"/>

  <!-- Paw prints scattered -->
  <!-- Paw 1 -->
  <ellipse cx="60" cy="100" rx="9" ry="7" fill="#ff6b35" fill-opacity="0.12"/>
  <ellipse cx="48" cy="88" rx="5" ry="6" fill="#ff6b35" fill-opacity="0.1"/>
  <ellipse cx="58" cy="85" rx="5" ry="6" fill="#ff6b35" fill-opacity="0.1"/>
  <ellipse cx="68" cy="87" rx="5" ry="6" fill="#ff6b35" fill-opacity="0.1"/>
  <ellipse cx="76" cy="94" rx="5" ry="6" fill="#ff6b35" fill-opacity="0.1"/>
  <!-- Paw 2 -->
  <ellipse cx="400" cy="540" rx="9" ry="7" fill="#e85a28" fill-opacity="0.12"/>
  <ellipse cx="388" cy="528" rx="5" ry="6" fill="#e85a28" fill-opacity="0.1"/>
  <ellipse cx="398" cy="525" rx="5" ry="6" fill="#e85a28" fill-opacity="0.1"/>
  <ellipse cx="408" cy="527" rx="5" ry="6" fill="#e85a28" fill-opacity="0.1"/>
  <ellipse cx="416" cy="534" rx="5" ry="6" fill="#e85a28" fill-opacity="0.1"/>

  <!-- ── Decorative card floating top-right ── -->
  <rect x="280" y="48" width="160" height="100" rx="16" fill="white" fill-opacity="0.8" stroke="#ece9e4" stroke-width="1"/>
  <!-- Card content — trust stats -->
  <text x="300" y="82" font-family="Sora, sans-serif" font-size="22" font-weight="700" fill="#1f2421">2.400+</text>
  <text x="300" y="98" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5f6b64" font-weight="500">Pets atendidos</text>
  <text x="300" y="122" font-family="Sora, sans-serif" font-size="22" font-weight="700" fill="#ff6b35">4.9 ★</text>
  <text x="300" y="138" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5f6b64" font-weight="500">Avaliação média</text>

  <!-- ── Main dog illustration center ── -->
  <!-- Dog body -->
  <ellipse cx="220" cy="395" rx="90" ry="75" fill="#d4cbc0"/>
  <!-- Dog head -->
  <circle cx="220" cy="270" r="70" fill="#d4cbc0"/>
  <!-- Ears floppy -->
  <ellipse cx="163" cy="255" rx="28" ry="40" fill="#c8bfb4" transform="rotate(-12 163 255)"/>
  <ellipse cx="277" cy="255" rx="28" ry="40" fill="#c8bfb4" transform="rotate(12 277 255)"/>
  <!-- Ear inner pink tint -->
  <ellipse cx="163" cy="258" rx="15" ry="24" fill="#ffe9df" fill-opacity="0.4" transform="rotate(-12 163 255)"/>
  <ellipse cx="277" cy="258" rx="15" ry="24" fill="#ffe9df" fill-opacity="0.4" transform="rotate(12 277 255)"/>

  <!-- Snout -->
  <ellipse cx="220" cy="293" rx="34" ry="26" fill="#c0b7ac"/>
  <!-- Nose -->
  <ellipse cx="220" cy="282" rx="12" ry="9" fill="#1f2421"/>
  <circle cx="215" cy="279" r="3.5" fill="white" fill-opacity="0.4"/>
  <!-- Mouth happy -->
  <path d="M202 300 Q220 316 238 300" stroke="#5f6b64" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Eyes happy/closed -->
  <path d="M193 260 Q204 250 215 260" stroke="#1f2421" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M225 260 Q236 250 247 260" stroke="#1f2421" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Collar brand accent -->
  <rect x="178" y="328" width="84" height="16" rx="8" fill="url(#auth-collar)"/>
  <!-- Collar tag -->
  <circle cx="220" cy="350" r="11" fill="#c84b20"/>
  <circle cx="220" cy="350" r="7" fill="#ff6b35"/>
  <!-- Tag letter -->
  <text x="217" y="354" font-family="Sora, sans-serif" font-size="9" font-weight="700" fill="white">B</text>

  <!-- Front paws -->
  <rect x="165" y="450" width="36" height="52" rx="18" fill="#d4cbc0"/>
  <rect x="239" y="450" width="36" height="52" rx="18" fill="#d4cbc0"/>
  <!-- Paw pads -->
  <ellipse cx="183" cy="498" rx="12" ry="7" fill="#bfb6ab"/>
  <ellipse cx="257" cy="498" rx="12" ry="7" fill="#bfb6ab"/>

  <!-- Tail wagging -->
  <path d="M308 385 Q355 355 350 395 Q348 420 328 410Z" fill="#c8bfb4"/>

  <!-- ── Bottom floating badge ── -->
  <rect x="120" y="570" width="240" height="50" rx="14" fill="white" fill-opacity="0.85" stroke="#ece9e4" stroke-width="1"/>
  <!-- Brand circle -->
  <circle cx="150" cy="595" r="14" fill="#ff6b35"/>
  <text x="145" y="599" font-family="Sora, sans-serif" font-size="14" fill="white">🐾</text>
  <text x="174" y="591" font-family="Sora, sans-serif" font-size="12" font-weight="700" fill="#1f2421">Agendamento 100% online</text>
  <text x="174" y="608" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#5f6b64">Rápido, fácil e sem estresse</text>

  <!-- Decorative plus marks -->
  <path d="M44" cy="240" font-family="none"/>
  <path d="M44 238 v10 M39 243 h10" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M434 200 v10 M429 205 h10" stroke="#e85a28" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M380 460 v8 M376 464 h8" stroke="#ff6b35" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
